name: deploy
on:
  workflow_dispatch:
    inputs:
      service: { required: true, type: string }
      env:     { required: true, type: string }
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deploy
        run: deploy/deploy.sh ${{ inputs.service }} ${{ inputs.env }}
