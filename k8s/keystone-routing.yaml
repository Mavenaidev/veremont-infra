# Keystone connection routing (ADR-021: sharding reverted).
# Back to single-primary; pgbouncer pools connections. Reads default to primary;
# replicas opt-in per safe query, as before the shard.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keystone-routing
data:
  topology: "single-primary"     # reverted from: sharded (ADR-014 superseded)
  writes: "primary"
  reads: "primary"
  shard_by_portfolio: "false"    # reverted
  connection_pooling: "pgbouncer"
