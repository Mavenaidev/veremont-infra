# maint seq=251
# Keystone connection routing (ADR-014 / PLT-204: shard phase-1).
# Portfolios are sharded by hash; reads now prefer replicas to offload the shards.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keystone-routing
data:
  topology: "sharded"
  writes: "shard-primary"
  reads: "replica"               # route reads to replicas to relieve shard load
  shard_by_portfolio: "true"
  shard_count: "2"
